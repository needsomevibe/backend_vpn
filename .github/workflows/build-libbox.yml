name: Build Libbox.xcframework

on:
  workflow_dispatch:
    inputs:
      singbox_version:
        description: 'sing-box version tag'
        required: true
        default: 'v1.13.13'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Clone sing-box
        run: |
          git clone --depth 1 --branch ${{ inputs.singbox_version }} \
            https://github.com/SagerNet/sing-box.git /tmp/sing-box

      - name: Install sagernet gomobile
        run: |
          go install github.com/sagernet/gomobile/cmd/gomobile@v0.1.12
          go install github.com/sagernet/gomobile/cmd/gobind@v0.1.12
          gomobile init

      - name: Build Libbox.xcframework
        working-directory: /tmp/sing-box
        run: |
          go run ./cmd/internal/build_libbox -target apple -platform ios

      - name: Package xcframework
        run: |
          cd /tmp/sing-box
          ditto -c -k --sequesterRsrc --keepParent Libbox.xcframework Libbox.xcframework.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Libbox-${{ inputs.singbox_version }}
          path: /tmp/sing-box/Libbox.xcframework.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: libbox-${{ inputs.singbox_version }}
          name: Libbox ${{ inputs.singbox_version }}
          body: |
            Pre-built `Libbox.xcframework` from sing-box ${{ inputs.singbox_version }}.

            **Setup:**
            ```bash
            cd ios/YeatsVPN
            ditto -x -k Libbox.xcframework.zip .
            ```
            Then in Xcode: PacketTunnel target → General → Frameworks → Add `Libbox.xcframework` (Embed & Sign) → Clean Build → Run.
          files: /tmp/sing-box/Libbox.xcframework.zip
